{% extends 'blog/base.html'%}
{% load crispy_forms_tags %}
{% block content %}

<div class="auth-card">
    <div class="auth-banner">
        <h1 class="auth-banner-title">Welcome back</h1>
    </div>

    <div class="auth-body">
        <p class="auth-label">Sign in to your account</p>
        <form method="POST">
            {% csrf_token %}
            <fieldset class="form-group">
                {{ form|crispy }}
            </fieldset>
            <div class="form-group mb-0">
                <button class="btn btn-outline-info auth-submit-btn" type="submit">
                    Login
                </button>
            </div>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'password_reset' %}" style="font-size: 0.82rem; color: #6b7280;">
                Forgot your password?
            </a>
        </div>
    </div>

    <div class="auth-footer">
        <small>
            Don't have an account?
            <a href="{% url 'register' %}">Sign Up</a>
        </small>
    </div>
</div>

{% endblock content %}
