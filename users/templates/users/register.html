{% extends 'blog/base.html'%}
{% load crispy_forms_tags %}
{% block content %}

<div class="auth-card">
    <div class="auth-banner">
        <h1 class="auth-banner-title">Create your account</h1>
    </div>

    <div class="auth-body">
        <p class="auth-label">Account details</p>
        <form method="POST">
            {% csrf_token %}
            <fieldset class="form-group">
                {{ form|crispy }}
            </fieldset>
            <div class="form-group mb-0">
                <button class="btn btn-outline-info auth-submit-btn" type="submit">
                    Sign Up
                </button>
            </div>
        </form>
    </div>

    <div class="auth-footer">
        <small>
            Already have an account?
            <a href="{% url 'login' %}">Sign In</a>
        </small>
    </div>
</div>

{% endblock content %}
