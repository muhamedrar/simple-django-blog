{% extends 'blog/base.html'%}
{% block content %}

<div class="auth-card" style="max-width: 480px;">
  <div class="auth-banner auth-banner--danger" style="height: 75px;">
    <h1 class="auth-banner-title">Delete Post</h1>
  </div>
  <div class="auth-body">

    <div class="delete-warning-icon">🗑️</div>
    <p class="delete-warning-title">Are you sure?</p>
    <p class="delete-warning-body">
      You're about to permanently delete
      <strong>"{{ object.title }}"</strong>.
      This action cannot be undone.
    </p>

    <form method="POST">
      {% csrf_token %}
      <div class="d-flex justify-content-between align-items-center mt-4">
        <a href="{% url 'post-detail' object.id %}"
           style="font-size: 0.82rem; color: #6b7280; text-decoration: none;">
          ← Keep post
        </a>
        <button class="btn delete-confirm-btn" type="submit">
          Yes, Delete
        </button>
      </div>
    </form>

  </div>
</div>

{% endblock content %}
