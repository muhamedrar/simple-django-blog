{% extends 'blog/base.html'%}
{% block content %}
    <div class="container">
  {% for post in posts %}
    <div class="post-card">
      
      <h2 class="post-title">{{ post.title }}</h2>
      
      <p class="post-meta">
        By <span class="author">{{ post.author }}</span> 
        on <span class="date">{{ post.date }}</span>
      </p>
      
      <p class="post-body">
        {{ post.text }}
      </p>

    </div>
  {% empty %}
    <p>No posts available.</p>
  {% endfor %}
</div>
{% endblock content %}
