{% extends 'blog/base.html'%}
{% block content %}
<div class="posts-container">

  <!-- Back link -->
  <a href="{% url 'blog-home' %}" class="detail-back-link">
    ← Back to posts
  </a>

  <article class="post-card detail-card">

    <!-- Header -->
    <div class="post-header">
      <img src="{{ object.author.profile.image.url }}"
           alt="{{ object.author.username }} profile picture"
           class="post-avatar">
      <div class="post-author-block">
        <div class="post-author-row">
          <span class="author">{{ object.author.username }}</span>
          <span class="date">{{ object.data_posted|date:"M d, Y" }}</span>
        </div>
        <h1 class="post-title detail-title">{{ object.title }}</h1>
      </div>
    </div>

    <!-- Divider -->
    <div class="detail-divider"></div>

    <!-- Full content -->
    <div class="detail-body">
      {{ object.content }}
    </div>

    <!-- Footer: actions -->
    {% if object.author == user %}
    <div class="post-footer">
      <span></span>
      <div class="post-actions">
        <a href="{% url 'post-update' object.id %}" class="post-action-btn edit">Edit</a>
        <a href="{% url 'post-delete' object.id %}" class="post-action-btn delete">Delete</a>
      </div>
    </div>
    {% endif %}

  </article>
</div>
{% endblock content %}
